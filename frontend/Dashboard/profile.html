<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevFinder — My Profile</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  /* Profile Specific Layout Tweaks */
  .profile-grid {
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 25px;
    height: 100%;
  }
  .profile-left { display: flex; flex-direction: column; gap: 25px; }
  .profile-right { display: flex; flex-direction: column; gap: 25px; overflow-y: auto; padding-right: 10px; }
  
  .avatar-island {
    background: var(--white); border: var(--border); border-radius: var(--radius);
    padding: 40px 20px; text-align: center; box-shadow: var(--shadow);
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .big-avatar-wrap { position: relative; width: 140px; height: 140px; }
  .big-avatar { 
    width: 100%; height: 100%; border-radius: 50%; border: var(--border); 
    background: var(--yellow); display: flex; align-items: center; justify-content: center;
    font-family: var(--font-title); font-size: 60px; box-shadow: var(--shadow-sm); overflow: hidden;
  }
  .big-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .cam-btn {
    position: absolute; bottom: 5px; right: 5px; width: 45px; height: 45px;
    background: var(--pink); border: var(--border); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; color: white; cursor: pointer;
    box-shadow: 3px 3px 0px black;
  }

  .info-island {
    background: var(--white); border: var(--border); border-radius: var(--radius);
    padding: 35px; box-shadow: var(--shadow);
  }
  
  .hosted-team-row {
    background: var(--black); color: var(--white); border: 3px solid var(--white);
    border-radius: 20px; padding: 20px 25px; display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 15px; box-shadow: 6px 6px 0px rgba(0,0,0,0.3);
  }
  .hosted-team-row h4 { font-family: var(--font-title); font-size: 26px; color: var(--yellow); }

  .skill-tag {
    background: var(--cyan); border: 2.5px solid var(--black); border-radius: 12px;
    padding: 6px 15px; font-weight: 800; font-size: 12px; display: inline-flex; align-items: center; gap: 8px;
  }
  .skill-tag button { background: none; border: none; cursor: pointer; font-size: 10px; font-weight: 900; }

  /* Edit Mode Overlay */
  .edit-overlay { display: none; margin-top: 20px; border-top: 2px dashed #ddd; padding-top: 20px; width: 100%; }
  .edit-overlay.active { display: block; }
</style>
</head>
<body>

<!-- SIDEBAR ISLAND (SYNCED) -->
<aside class="sidebar">
  <div class="user-profile">
    <div class="avatar" id="sidebar-avatar-circle"><i class="fa-solid fa-bolt"></i></div>
    <div class="user-info">
      <h2 id="sidebar-u-name">SREERAG</h2>
      <p id="sidebar-u-role">MEMBER</p>
    </div>
  </div>

  <nav class="nav-list">
    <a class="nav-item" href="dashboard.html">
      <i class="fa-solid fa-house"></i> <span>Dashboard</span>
    </a>
    <a class="nav-item" href="dashboard.html">
      <i class="fa-solid fa-wand-magic-sparkles"></i> <span>Recommended</span>
    </a>
    <a class="nav-item" href="dashboard.html">
      <i class="fa-solid fa-users"></i> <span>My Teams</span>
    </a>
    <a class="nav-item" href="dashboard.html">
      <i class="fa-solid fa-list-check"></i> <span>My Hosted</span>
    </a>
    <div class="nav-item active">
      <i class="fa-solid fa-circle-user"></i> <span>Profile</span>
    </div>
  </nav>

  <div style="margin-top:auto">
    <div class="nav-item danger" onclick="logout()">
      <i class="fa-solid fa-power-off"></i> <span>Log Out</span>
    </div>
    <div class="sidebar-logo">DevFinder</div>
  </div>
</aside>

<!-- MAIN AREA ISLAND -->
<main class="main-area">
  <header class="top-bar">
    <button class="btn-host" onclick="window.location.href='dashboard.html'" style="background:var(--white); color:black; border:var(--border); box-shadow:var(--shadow-sm)">
      <i class="fa-solid fa-arrow-left"></i> DASHBOARD
    </button>
    <div style="flex:1"></div>
    <button class="btn-host" id="edit-trigger-btn">
      <i class="fa-solid fa-pen-nib"></i> EDIT PROFILE
    </button>
  </header>

  <section class="scroll-area">
    <div class="profile-grid">
      
      <!-- LEFT COLUMN -->
      <div class="profile-left">
        <div class="avatar-island">
          <div class="big-avatar-wrap">
            <div class="big-avatar" id="p-avatar-big">S</div>
            <label class="cam-btn" for="avatar-input">
              <i class="fa-solid fa-camera"></i>
            </label>
            <input type="file" id="avatar-input" hidden accept="image/*">
          </div>
          <div>
            <h1 style="font-family:var(--font-title); font-size:42px; line-height:1;" id="p-full-name">SREERAG</h1>
            <p style="font-weight:800; opacity:0.5; font-size:12px; margin-top:5px;" id="p-email">sreerag@devfinder.com</p>
          </div>
          <div style="display:flex; gap:15px; width:100%;">
            <a id="p-github-link" href="#" target="_blank" class="btn-icon" style="flex:1; border-radius:15px;"><i class="fa-brands fa-github"></i></a>
            <a id="p-linkedin-link" href="#" target="_blank" class="btn-icon" style="flex:1; border-radius:15px;"><i class="fa-brands fa-linkedin"></i></a>
          </div>
        </div>

        <div class="info-island">
          <h3 style="font-family:var(--font-title); font-size:28px; margin-bottom:15px; border-bottom:3px solid black;">LINKS</h3>
          <div class="field"><label>GitHub</label><p id="v-github" style="font-weight:700; opacity:0.6;">Not added</p></div>
          <div class="field"><label>LinkedIn</label><p id="v-linkedin" style="font-weight:700; opacity:0.6;">Not added</p></div>
        </div>
      </div>

      <!-- RIGHT COLUMN -->
      <div class="profile-right">
        
        <!-- ABOUT ISLAND -->
        <div class="info-island">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-family:var(--font-title); font-size:44px;">ABOUT ME</h2>
            <div id="p-since" style="font-size:10px; font-weight:900; opacity:0.4;">MEMBER SINCE 2026</div>
          </div>
          
          <div id="view-mode">
            <div class="field"><label>Bio</label><p id="v-bio" style="font-weight:700; line-height:1.6;">No bio added yet. Tell the world who you are!</p></div>
            <div class="field">
              <label>Skills</label>
              <div id="v-skills" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;"></div>
            </div>
          </div>

          <!-- EDIT MODE (HIDDEN) -->
          <div id="edit-mode" style="display:none;">
            <div class="field"><label>Full Name</label><input type="text" id="e-name"></div>
            <div class="field"><label>Bio</label><textarea id="e-bio" style="height:100px;"></textarea></div>
            <div class="field"><label>GitHub URL</label><input type="text" id="e-github"></div>
            <div class="field"><label>LinkedIn URL</label><input type="text" id="e-linkedin"></div>
            <div class="field">
              <label>Skills</label>
              <div id="e-skills" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px;"></div>
              <div style="display:flex; gap:10px;">
                <input type="text" id="skill-input" placeholder="Add skill..." style="flex:1">
                <button class="btn-host" id="add-skill-btn" style="padding:0 20px;">ADD</button>
              </div>
            </div>
            <div style="display:flex; gap:15px; margin-top:30px;">
              <button class="btn-host" style="flex:1; background:var(--green); color:black;" id="save-profile-btn">SAVE CHANGES</button>
              <button class="btn-host" style="flex:0.5; background:var(--white); color:black; border:var(--border);" id="cancel-edit-btn">CANCEL</button>
            </div>
          </div>
        </div>

        <!-- HOSTED TEAMS ISLAND -->
        <div class="info-island">
          <h2 style="font-family:var(--font-title); font-size:44px; margin-bottom:20px;">MY HOSTED TEAMS</h2>
          <div id="hosted-list">
            <!-- Teams will render here -->
          </div>
        </div>

      </div>

    </div>
  </section>
</main>

<!-- APPLICANTS MODAL -->
<div class="modal-bg" id="modal-applicants">
  <div class="modal-content" style="width:700px; max-height:85vh; overflow-y:auto;">
    <h1 style="font-family:var(--font-title); font-size:48px; border-bottom:var(--border); margin-bottom:25px;" id="m-team-name">APPLICANTS</h1>
    <button class="modal-close" onclick="document.getElementById('modal-applicants').classList.remove('active')"><i class="fa-solid fa-x"></i></button>
    <div id="applicant-list" style="display:flex; flex-direction:column; gap:15px;"></div>
  </div>
</div>

<div id="alerts" style="position:fixed; top:20px; right:20px; z-index:3000;"></div>

<script src="profile.js"></script>
</body>
</html>
